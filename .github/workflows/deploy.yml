name: Agro AI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/agro-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/agro-backend:${{ github.sha }}

    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/agro-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/agro-frontend:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/Agro-Soil-AI-Innovation
          git pull origin main
          kubectl set image deployment/agro-backend \
            agro-backend=${{ secrets.DOCKER_USERNAME }}/agro-backend:${{ github.sha }}
          kubectl set image deployment/agro-frontend \
            agro-frontend=${{ secrets.DOCKER_USERNAME }}/agro-frontend:${{ github.sha }}
          kubectl rollout status deployment/agro-backend
          kubectl rollout status deployment/agro-frontend
          echo "Deployment successful!"
          kubectl get pods
